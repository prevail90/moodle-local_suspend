name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - version.php
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Read plugin version metadata
        id: meta
        run: |
          while IFS='=' read -r key value; do
            case "$key" in
              release) RELEASE="$value" ;;
              version) VERSION="$value" ;;
              maturity) MATURITY="$value" ;;
            esac
          done < <(php <<'PHP'
          <?php
          define('MOODLE_INTERNAL', true);
          define('MATURITY_ALPHA', 100);
          define('MATURITY_BETA', 200);
          define('MATURITY_RC', 300);
          define('MATURITY_STABLE', 400);

          $plugin = new stdClass();
          require __DIR__ . '/version.php';

          foreach (['release', 'version', 'maturity'] as $property) {
              if (!isset($plugin->{$property})) {
                  fwrite(STDERR, "Missing $property in version.php\n");
                  exit(1);
              }
              echo $property . '=' . $plugin->{$property} . PHP_EOL;
          }
          PHP
          )

          if [ -z "$RELEASE" ] || [ -z "$VERSION" ] || [ -z "$MATURITY" ]; then
            echo "Failed to parse version.php" >&2
            exit 1
          fi

          TAG="v$RELEASE"
          HAS_PRERELEASE_SUFFIX=false
          if [[ "$RELEASE" =~ -[0-9A-Za-z.-]+$ ]]; then
            HAS_PRERELEASE_SUFFIX=true
          fi

          if [ "$MATURITY" = "400" ] || [ "$MATURITY" = "MATURITY_STABLE" ]; then
            PRERELEASE=false
            if [ "$HAS_PRERELEASE_SUFFIX" = true ]; then
              echo "Stable releases must not include a prerelease suffix in \$plugin->release." >&2
              exit 1
            fi
          else
            PRERELEASE=true
            if [ "$HAS_PRERELEASE_SUFFIX" = false ]; then
              echo "Prereleases must include a suffix in \$plugin->release, for example 0.5.0-alpha or 0.5.0-beta.3." >&2
              exit 1
            fi
          fi

          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "maturity=$MATURITY" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          if git rev-parse "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.meta.outputs.tag }} already exists locally."
          fi

          if git ls-remote --tags origin "${{ steps.meta.outputs.tag }}" | grep -q "${{ steps.meta.outputs.tag }}"; then
            echo "Tag ${{ steps.meta.outputs.tag }} already exists on origin."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" -m "Release ${{ steps.meta.outputs.release }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Build release notes
        id: notes
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -Fxv "${{ steps.meta.outputs.tag }}" | head -n 1)

          {
            echo "body<<EOF"
            echo "Moodle plugin release \`${{ steps.meta.outputs.release }}\`."
            echo
            echo "Plugin build version: \`${{ steps.meta.outputs.version }}\`"
            echo "Plugin maturity: \`${{ steps.meta.outputs.maturity }}\`"
            echo
            echo "## Changes"

            if [ -n "$PREVIOUS_TAG" ]; then
              git log --no-merges --pretty='- %s' "$PREVIOUS_TAG"..HEAD
            else
              git log --no-merges --pretty='- %s'
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          name: ${{ steps.meta.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
